name: Deploy

on:
  workflow_dispatch:
    inputs:
      frontend_tag:
        description: 'Docker tag for the frontend image (nitinkdocker18/ecommerce:<tag>).'
        required: false
        default: 'frontend'
      api_tag:
        description: 'Docker tag for the backend image (nitinkdocker18/ecommerce:<tag>).'
        required: false
        default: 'api'
  repository_dispatch:
    types: [frontend-image-pushed, api-image-pushed]

env:
  IMAGE_REPO: nitinkdocker18/ecommerce
  DOMAIN: ecommerce.nitinkdevs.com
  EMAIL: nitinkwork18@gmail.com
  AWS_DEFAULT_REGION: ap-south-1

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
      AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
      FRONTEND_TAG: ${{ github.event.inputs.frontend_tag || 'frontend' }}
      API_TAG:      ${{ github.event.inputs.api_tag      || 'api' }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Discover EC2 instance by tag
        id: ec2
        run: |
          INFO=$(aws ec2 describe-instances \
            --filters "Name=tag:Name,Values=ecommerce-server" \
                      "Name=instance-state-name,Values=running" \
            --query 'Reservations[].Instances[].[PublicIpAddress,InstanceId,Placement.AvailabilityZone]' \
            --output text | head -1)

          if [ -z "$INFO" ] || [ "$INFO" = "None" ]; then
            echo "::error::No running EC2 instance with tag Name=ecommerce-server found in $AWS_DEFAULT_REGION."
            echo "::error::Run the 'Terraform Apply' workflow first to provision infra."
            exit 1
          fi

          HOST=$(echo "$INFO" | awk '{print $1}')
          INSTANCE_ID=$(echo "$INFO" | awk '{print $2}')
          INSTANCE_AZ=$(echo "$INFO" | awk '{print $3}')

          echo "Discovered EC2: $INSTANCE_ID @ $HOST ($INSTANCE_AZ)"
          echo "HOST=$HOST"                 >> $GITHUB_ENV
          echo "INSTANCE_ID=$INSTANCE_ID"   >> $GITHUB_ENV
          echo "INSTANCE_AZ=$INSTANCE_AZ"   >> $GITHUB_ENV

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.EC2_SSH_KEY }}" | tr -d '\r' > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keygen -y -f ~/.ssh/deploy_key > ~/.ssh/deploy_key.pub
          echo "Key fingerprint: $(ssh-keygen -lf ~/.ssh/deploy_key)"

      - name: Wait for SSH to be reachable
        run: |
          for i in {1..30}; do
            if nc -z -w 5 "$HOST" 22; then
              echo "SSH port reachable"
              break
            fi
            echo "Waiting for SSH... ($i/30)"
            sleep 10
          done
          ssh-keyscan -H "$HOST" >> ~/.ssh/known_hosts 2>/dev/null

      - name: Push key via EC2 Instance Connect
        run: |
          aws ec2-instance-connect send-ssh-public-key \
            --instance-id "$INSTANCE_ID" \
            --availability-zone "$INSTANCE_AZ" \
            --instance-os-user ubuntu \
            --ssh-public-key "file://$HOME/.ssh/deploy_key.pub"
          echo "Key pushed via EC2 Instance Connect (valid for 60s)"

      - name: Prepare remote directories
        run: |
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@"$HOST" \
            "sudo mkdir -p /opt/ecommerce && sudo chown ${{ secrets.EC2_USER }}:${{ secrets.EC2_USER }} /opt/ecommerce"

      - name: Copy compose and nginx config to EC2
        run: |
          scp -i ~/.ssh/deploy_key compose/docker-compose.yml \
            ${{ secrets.EC2_USER }}@"$HOST":/opt/ecommerce/docker-compose.yml
          scp -i ~/.ssh/deploy_key nginx/ecommerce.conf \
            ${{ secrets.EC2_USER }}@"$HOST":/tmp/ecommerce.conf
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@"$HOST" \
            "sudo mv /tmp/ecommerce.conf /etc/nginx/sites-available/ecommerce 2>/dev/null || true"

      - name: Deploy to EC2
        env:
          PROD_ENV_B64: ${{ secrets.PROD_ENV_B64 }}
        run: |
          echo "Encoded env secret length: ${#PROD_ENV_B64} chars"
          ssh -i ~/.ssh/deploy_key ${{ secrets.EC2_USER }}@"$HOST" \
            "PROD_ENV_B64='$PROD_ENV_B64' FRONTEND_TAG='$FRONTEND_TAG' API_TAG='$API_TAG' bash -s" << 'ENDSSH'
            set -e

            IMAGE_REPO="${{ env.IMAGE_REPO }}"
            DOMAIN="${{ env.DOMAIN }}"
            EMAIL="${{ env.EMAIL }}"

            # 1. Install Nginx + Certbot if missing
            if ! command -v nginx &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y nginx certbot python3-certbot-nginx
              sudo systemctl enable nginx
              sudo systemctl start nginx
            fi

            # 2. Install Docker + compose plugin if missing
            if ! command -v docker &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker.io docker-compose-plugin
              sudo systemctl enable docker
              sudo systemctl start docker
              sudo usermod -aG docker ubuntu
            fi
            if ! docker compose version &>/dev/null; then
              sudo apt-get update -y
              sudo apt-get install -y docker-compose-plugin
            fi

            # 3. Write env file from GitHub secret
            sudo mkdir -p /opt/ecommerce
            DECODED=$(echo "${PROD_ENV_B64}" | tr -d ' \n\r\t' | base64 -d 2>/dev/null || echo "")
            if [ -z "$DECODED" ] || [ "$(echo "$DECODED" | wc -l)" -lt 3 ]; then
              echo "WARNING: PROD_ENV_B64 is empty or too short. Keeping existing /opt/ecommerce/backend.env"
              if [ ! -f /opt/ecommerce/backend.env ]; then
                echo "ERROR: No existing backend.env and secret is empty. Aborting."
                exit 1
              fi
            else
              echo "$DECODED" | sudo tee /opt/ecommerce/backend.env > /dev/null
              sudo chmod 600 /opt/ecommerce/backend.env
              echo "Env file written, $(sudo wc -l < /opt/ecommerce/backend.env) lines"
            fi

            # 4. Activate Nginx site
            sudo ln -sf /etc/nginx/sites-available/ecommerce /etc/nginx/sites-enabled/ecommerce
            sudo rm -f /etc/nginx/sites-enabled/default
            sudo nginx -t

            # 5. Obtain SSL cert on first deploy
            if [ ! -d /etc/letsencrypt/live/$DOMAIN ]; then
              if sudo certbot --nginx \
                --non-interactive \
                --agree-tos \
                --email "$EMAIL" \
                -d "$DOMAIN" \
                -d "www.$DOMAIN"; then
                echo "SSL certificate obtained."
              else
                echo "Certbot failed — DNS not ready yet. Continuing on HTTP."
                sudo systemctl reload nginx
              fi
            else
              sudo systemctl reload nginx
            fi

            # 6. Pull and (re)start containers via compose
            cd /opt/ecommerce
            export FRONTEND_TAG="$FRONTEND_TAG"
            export API_TAG="$API_TAG"
            echo "Deploying images: $IMAGE_REPO:$FRONTEND_TAG  +  $IMAGE_REPO:$API_TAG"
            sudo -E docker compose -f /opt/ecommerce/docker-compose.yml pull
            sudo -E docker compose -f /opt/ecommerce/docker-compose.yml up -d --remove-orphans

            # 7. Health check with retry (backend API)
            echo "Waiting for backend to be ready..."
            for i in {1..30}; do
              if curl -fs http://localhost:4000/api/v1/stripeapikey > /dev/null; then
                echo "Backend is healthy"
                break
              fi
              if [ $i -eq 30 ]; then
                echo "Backend health check failed after 60s. Container state:"
                sudo docker compose -f /opt/ecommerce/docker-compose.yml ps
                sudo docker compose -f /opt/ecommerce/docker-compose.yml logs --tail=100
                echo "Env file (keys only):"
                sudo sed 's/=.*/=***/' /opt/ecommerce/backend.env | head -20
                exit 1
              fi
              sleep 2
            done

            # 8. Health check frontend container
            echo "Waiting for frontend to be ready..."
            for i in {1..15}; do
              if curl -fsI http://localhost:8080/ > /dev/null; then
                echo "Frontend is healthy"
                break
              fi
              if [ $i -eq 15 ]; then
                echo "Frontend health check failed."
                sudo docker compose -f /opt/ecommerce/docker-compose.yml logs frontend --tail=100
                exit 1
              fi
              sleep 2
            done

            sudo docker image prune -af
            echo "Deployment successful! Live at https://$DOMAIN"
          ENDSSH

      - name: Summary
        if: always()
        run: |
          {
            echo "## Deploy summary"
            echo ""
            echo "- Host: \`$HOST\`"
            echo "- Frontend tag: \`$FRONTEND_TAG\`"
            echo "- Backend tag: \`$API_TAG\`"
            echo "- URL: https://${{ env.DOMAIN }}"
          } >> $GITHUB_STEP_SUMMARY
